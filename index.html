<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>寶</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='26' fill='%23060608'/%3E%3Crect width='120' height='120' rx='26' fill='url(%23g)'/%3E%3Cdefs%3E%3CradialGradient id='g' cx='30%25' cy='30%25'%3E%3Cstop offset='0' stop-color='%23FF6B1A' stop-opacity='0.25'/%3E%3Cstop offset='100%25' stop-color='%23060608' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ctext x='60' y='82' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%23FF6B1A' text-anchor='middle' letter-spacing='-2'%3E%E5%AF%B6%3C/text%3E%3Crect x='15' y='88' width='90' height='3' rx='1.5' fill='%23FF6B1A' opacity='0.6'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07080F;
  --p:#7B6EFF;--p2:#A89CFF;--pg:linear-gradient(135deg,#7B6EFF,#B06EFF);
  --o:#FF6B1A;--o2:#FF8C4A;--og:linear-gradient(135deg,#FF6B1A,#FF9A4A);
  --g:#00E5A0;--r:#FF5C5C;
  --t1:#F0F0FF;--t2:#8888A8;--t3:#44445A;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:90px;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 0%,rgba(123,110,255,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(255,107,26,0.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{display:none;}
.page{display:none;padding:0 18px;position:relative;z-index:1;}
.page.active{display:block;}

/* IP CHARACTER */
.ip-char{position:fixed;top:0;right:-10px;width:75vw;max-width:320px;height:67vh;opacity:0;pointer-events:none;z-index:2;transition:opacity 0.5s;}
.ip-char.visible{opacity:0.28;}
.ip-char img{width:100%;height:100%;object-fit:contain;object-position:bottom right;}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,8,15,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:100;padding:10px 0 max(10px,env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;cursor:pointer;border:none;background:none;transition:all 0.2s;}
.ni svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all 0.2s;}
.ni span{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:0.5px;transition:all 0.2s;}
.ni.active svg{stroke:var(--o);}
.ni.active span{color:var(--o);}

/* HOME HEADER */
.home-header{padding:56px 0 0;}
.clock-time{font-size:52px;font-weight:900;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#F0F0FF,#A89CFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.clock-date{font-size:13px;color:var(--t2);font-weight:500;margin-top:4px;letter-spacing:0.5px;}
.weather-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.weather-temp{font-size:18px;font-weight:700;}
.weather-desc{font-size:13px;color:var(--t2);}
.greeting-line{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin:14px 0 16px;}
.greeting-line span{background:var(--og);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* TODAY CARD */
.today-card{padding:22px;margin-bottom:14px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(123,110,255,0.15),rgba(7,8,15,0.8));border:1px solid rgba(123,110,255,0.25);border-radius:24px;}
.today-card::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(123,110,255,0.15) 0%,transparent 70%);pointer-events:none;}
.tc-eyebrow{font-size:10px;font-weight:700;color:var(--p2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.tc-title{font-size:26px;font-weight:900;letter-spacing:-0.5px;line-height:1.1;margin-bottom:3px;}
.tc-sub{font-size:13px;color:var(--t2);margin-bottom:18px;}
.tc-tags{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tag{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;background:rgba(123,110,255,0.15);color:var(--p2);border:1px solid rgba(123,110,255,0.25);}
.start-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--og);color:white;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.start-btn:active{transform:scale(0.97);}
.done-badge{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.2);border-radius:12px;padding:12px;color:var(--g);font-weight:700;font-size:14px;text-align:center;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat{padding:16px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-border);}
.stat-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.stat-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;}
.stat-unit{font-size:12px;font-weight:500;color:var(--t2);}
.stat-delta{font-size:11px;margin-top:4px;font-weight:600;}
.delta-good{color:var(--g);}.delta-bad{color:var(--r);}.delta-neu{color:var(--t3);}

/* PAGE HEADER */
.ph{padding:56px 0 16px;position:sticky;top:0;background:linear-gradient(var(--bg) 75%,transparent);z-index:10;}
.pt{font-size:26px;font-weight:900;letter-spacing:-0.5px;}
.ps{font-size:12px;color:var(--t3);margin-top:2px;font-weight:500;}

/* WORKOUT */
.tab-row{display:flex;gap:5px;margin-bottom:18px;background:rgba(255,255,255,0.04);padding:4px;border-radius:16px;border:1px solid var(--glass-border);}
.tab{flex:1;padding:9px 0;border-radius:12px;border:none;background:none;color:var(--t3);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.tab.active{background:var(--og);color:white;box-shadow:0 2px 12px rgba(255,107,26,0.3);}
.ex-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-bottom:10px;transition:all 0.3s;}
.ex-card.done{border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.04);}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.ex-name{font-size:16px;font-weight:800;}
.ex-meta{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500;}
.done-pill{background:rgba(0,229,160,0.15);color:var(--g);font-size:11px;font-weight:800;padding:4px 10px;border-radius:100px;white-space:nowrap;}
.last-rec{background:rgba(123,110,255,0.1);border:1px solid rgba(123,110,255,0.15);border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:12px;color:var(--p2);font-weight:600;display:flex;align-items:center;gap:6px;}
.sets-header{display:grid;grid-template-columns:28px 1fr 1fr 80px;gap:8px;margin-bottom:6px;padding:0 2px;}
.sets-header span{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;text-align:center;}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 80px;gap:8px;align-items:center;margin-bottom:6px;}
.set-num{font-size:12px;font-weight:800;color:var(--t3);text-align:center;}
.si{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 4px;color:var(--t1);font-size:15px;font-weight:800;text-align:center;width:100%;outline:none;transition:border-color 0.2s;-webkit-appearance:none;font-family:inherit;}
.si:focus{border-color:var(--o);}
.si::placeholder{color:var(--t3);font-weight:400;}
.timer-btn{background:rgba(255,107,26,0.15);border:1px solid rgba(255,107,26,0.3);border-radius:10px;padding:8px 4px;color:var(--o);font-size:11px;font-weight:800;cursor:pointer;text-align:center;transition:all 0.2s;font-family:inherit;width:100%;}
.timer-btn.running{background:rgba(255,107,26,0.25);border-color:var(--o);animation:pulse 1s infinite;}
.timer-btn.done{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--g);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,26,0.4);}50%{box-shadow:0 0 0 6px rgba(255,107,26,0);}}
.rpe-wrap{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);}
.rpe-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.rpe-row{display:flex;gap:5px;}
.rpe-btn{flex:1;padding:8px 0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--t2);font-size:13px;font-weight:800;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.rpe-btn.sel{background:var(--og);border-color:transparent;color:white;}
.rpe-btn:active{transform:scale(0.9);}
.done-btn{width:100%;padding:16px;border-radius:16px;border:none;background:var(--og);color:white;font-size:16px;font-weight:900;cursor:pointer;margin-top:12px;transition:all 0.2s;box-shadow:0 4px 24px rgba(255,107,26,0.25);font-family:inherit;}
.done-btn:active{transform:scale(0.97);}

/* TRACK */
.date-input{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:12px 16px;color:var(--t1);font-size:14px;width:100%;outline:none;font-family:inherit;margin-bottom:16px;}
.metric-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-bottom:10px;}
.m-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.m-name{font-size:14px;font-weight:800;}
.m-goal{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500;}
.m-input-wrap{display:flex;align-items:center;gap:6px;}
.m-num{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:9px 10px;color:var(--t1);font-size:18px;font-weight:900;width:90px;text-align:center;-webkit-appearance:none;outline:none;transition:border-color 0.2s;font-family:inherit;}
.m-num:focus{border-color:var(--o);}
.m-unit{font-size:12px;color:var(--t3);font-weight:500;min-width:24px;}
.bar-wrap{margin-top:0;}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:600;}
.bar-bg{background:rgba(255,255,255,0.06);border-radius:100px;height:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width 0.5s ease;}
.save-btn{width:100%;padding:15px;border-radius:16px;border:none;background:var(--og);color:white;font-size:15px;font-weight:900;cursor:pointer;margin-top:4px;transition:all 0.2s;font-family:inherit;}
.save-btn:active{transform:scale(0.97);}
.hist-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-top:16px;}
.hist-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-size:12px;color:var(--t3);font-weight:500;}
.hist-main{font-size:15px;font-weight:900;}
.hist-sub{font-size:11px;color:var(--t3);}

/* PROGRESS */
.ex-select{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:12px 16px;color:var(--t1);font-size:14px;font-weight:700;width:100%;margin-bottom:16px;-webkit-appearance:none;outline:none;font-family:inherit;}
.chart-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:20px;margin-bottom:12px;}
.chart-head{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:16px;}
canvas{width:100%!important;display:block;}
.pb-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-bottom:10px;}
.pb-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.pb-best{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.pb-val{font-size:36px;font-weight:900;letter-spacing:-1.5px;background:var(--og);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pb-u{font-size:15px;color:var(--t2);}
.pb-sub{font-size:12px;color:var(--t3);}

/* DIET */
.water-card{background:linear-gradient(135deg,rgba(255,107,26,0.1),rgba(7,8,15,0.6));border:1px solid rgba(255,107,26,0.2);border-radius:24px;padding:20px;margin-bottom:12px;}
.water-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.water-label{font-size:10px;font-weight:700;color:var(--o);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.water-big{font-size:36px;font-weight:900;letter-spacing:-1.5px;color:var(--o);}
.water-sub{font-size:12px;color:var(--t3);}
.water-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.wc{height:42px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;}
.wc.on{background:rgba(255,107,26,0.2);border-color:rgba(255,107,26,0.5);}
.wc.target{background:rgba(255,107,26,0.35);border-color:var(--o);box-shadow:0 0 12px rgba(255,107,26,0.3);}
.wc:active{transform:scale(0.85);}
.water-hint{font-size:10px;color:var(--t3);margin-top:8px;text-align:center;font-weight:500;}
.water-goal-badge{margin-top:10px;padding:8px 12px;background:rgba(255,107,26,0.15);border:1px solid rgba(255,107,26,0.3);border-radius:10px;font-size:12px;font-weight:700;color:var(--o);text-align:center;}
.meal-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-bottom:10px;}
.meal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.meal-name{font-size:15px;font-weight:800;}
.meal-check{width:26px;height:26px;border:2px solid rgba(255,255,255,0.12);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:13px;background:rgba(255,255,255,0.05);}
.meal-check.on{background:var(--g);border-color:var(--g);color:#06100D;font-weight:900;}
.meal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.meal-tag{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.05);color:var(--t3);border:1px solid rgba(255,255,255,0.08);}
.meal-note{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;color:var(--t1);font-size:13px;width:100%;resize:none;outline:none;font-family:inherit;height:64px;transition:border-color 0.2s;}
.meal-note:focus{border-color:var(--o);}
.check-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:18px;margin-bottom:10px;}
.check-row{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer;}
.check-row:first-of-type{border-bottom:1px solid rgba(255,255,255,0.05);}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.check-box.on{background:var(--o);border-color:var(--o);}
.check-text{font-size:14px;font-weight:600;}
.empty{text-align:center;padding:48px 20px;color:var(--t3);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-text{font-size:14px;line-height:1.6;}

/* CELEBRATE MODAL */
.celebrate-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
.celebrate-overlay.show{opacity:1;pointer-events:all;}
.celebrate-box{background:linear-gradient(135deg,rgba(255,107,26,0.2),rgba(7,8,15,0.95));border:1px solid rgba(255,107,26,0.3);border-radius:28px;padding:32px 24px;text-align:center;max-width:320px;width:90%;position:relative;transform:scale(0.8);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.celebrate-overlay.show .celebrate-box{transform:scale(1);}
.celebrate-char{width:160px;height:180px;margin:0 auto 16px;}
.celebrate-title{font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:8px;background:var(--og);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.celebrate-sub{font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.5;}
.celebrate-close{width:100%;padding:14px;border-radius:14px;border:none;background:var(--og);color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.celebrate-close:active{transform:scale(0.97);}
@keyframes floatUp{0%{transform:translateY(0);}50%{transform:translateY(-8px);}100%{transform:translateY(0);}}
.celebrate-char svg{animation:floatUp 2s ease-in-out infinite;}
</style>
</head>
<body>

<!-- IP CHARACTER (background) -->
<div class="ip-char" id="ip-char" style="display:none;">
  <img id="ip-img" style="width:100%;height:100%;object-fit:contain;object-position:bottom right;filter:drop-shadow(0 0 30px rgba(255,107,26,0.1));" src="" alt="">
</div>

<!-- CELEBRATE MODAL -->
<div class="celebrate-overlay" id="celebrate-overlay">
  <div class="celebrate-box">
    <div class="celebrate-char" id="celebrate-char"></div>
    <div class="celebrate-title" id="celebrate-title">完成！</div>
    <div class="celebrate-sub" id="celebrate-sub">今日訓練紀錄已儲存</div>
    <button class="celebrate-close" onclick="closeCelebrate()">繼續保持 💪</button>
  </div>
</div>

<div id="page-home" class="page active">
  <div class="home-header">
    <div style="margin-bottom:16px;">
      <div class="clock-time" id="clock-time">00:00</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="weather-row" id="weather-row" style="display:none;">
        <span class="weather-temp" id="weather-temp"></span>
        <span class="weather-desc" id="weather-desc"></span>
      </div>
    </div>
    <div class="greeting-line" id="h-greeting"></div>
  </div>
  <div id="home-body"></div>
</div>

<div id="page-workout" class="page">
  <div class="ph">
    <div class="pt" id="wp-title">今日訓練</div>
    <div class="ps" id="wp-sub"></div>
  </div>
  <div id="workout-body"></div>
</div>

<div id="page-track" class="page">
  <div class="ph">
    <div class="pt">身體數據</div>
    <div class="ps">每週六早上空腹量測</div>
  </div>
  <div id="track-body"></div>
</div>

<div id="page-progress" class="page">
  <div class="ph">
    <div class="pt">重量進步</div>
    <div class="ps">追蹤每個動作最高重量</div>
  </div>
  <div id="progress-body"></div>
</div>

<div id="page-diet" class="page">
  <div class="ph">
    <div class="pt">今日飲食</div>
    <div class="ps" id="diet-sub"></div>
  </div>
  <div id="diet-body"></div>
</div>

<nav class="nav">
  <button class="ni active" onclick="go('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>今天</span>

function updateClock(){
  const d=today();

  const el=document.getElementById('clock-time');
  const de=document.getElementById('clock-date');
  if(el)el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  const grEl=document.getElementById('h-greeting');
  if(grEl){
    let gr,icon;

    else if(h>=12&&h<18){gr='午安';icon='🌤';}
    else{gr='晚安';icon='🌙';}
    grEl.innerHTML=`${gr}，<span>阿寶</span> ${icon}`;
  }
}

// ── WEATHER ──
function fetchWeather(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lon}=pos.coords;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=auto`)
      .then(r=>r.json()).then(data=>{
        const temp=Math.round(data.current.temperature_2m);
        const code=data.current.weathercode;
        const desc=wDesc(code),icon=wIcon(code);
        const row=document.getElementById('weather-row');
        if(row){
          document.getElementById('weather-temp').textContent=`${icon} ${temp}°C`;
          document.getElementById('weather-desc').textContent=desc;
          row.style.display='flex';
        }
      }).catch(()=>{});
  },()=>{});
}
function wDesc(c){if(c===0)return'晴天';if(c<=2)return'多雲';if(c<=3)return'陰天';if(c<=49)return'有霧';if(c<=59)return'毛毛雨';if(c<=69)return'下雨';if(c<=79)return'下雪';return'雷陣雨';}
function wIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';if(c<=49)return'🌫';if(c<=69)return'🌧';if(c<=79)return'❄️';return'⛈';}
fetchWeather();

function renderHome(){
  const d=today();
  const wk=SCH[d.getDay()];
  const w=wk?WO[wk]:null;
  const logs=ld('logs',{});
  const done=logs[tdk()]?.completed;
  const bh=ld('body_h',[]);
  const lat=bh.length?bh[bh.length-1]:null;
  const prev=bh.length>1?bh[bh.length-2]:null;
  let h='';
  if(w){
    h+=`<div class="today-card">
      <div class="tc-eyebrow">${w.day} · 今日任務</div>
      <div class="tc-title">${w.name}</div>
      <div class="tc-sub">${w.sub}</div>
      <div class="tc-tags"><span class="tag">6個動作</span><span class="tag">45分鐘</span><span class="tag">伸展15分</span></div>
      ${done?`<div class="done-badge">✅ 今日訓練完成</div>`:`<button class="start-btn" onclick="go('workout')">開始訓練 →</button>`}
    </div>`;
  }else{
    h+=`<div class="today-card">
      <div class="tc-eyebrow">${DAYS[d.getDay()]} · 今日</div>
      <div class="tc-title">休息 & 恢復</div>
      <div class="tc-sub">好好休息，記得喝水，40分鐘有氧收尾</div>
    </div>`;
  }
  const stats=[
    {n:'體重',v:(lat?.weight??79.3),u:'kg',prev:(prev?.weight??null),dir:'down'},
    {n:'體脂率',v:(lat?.fat_pct??28.6),u:'%',prev:(prev?.fat_pct??null),dir:'down'},
    {n:'骨骼肌',v:(lat?.muscle_kg??28.1),u:'kg',prev:(prev?.muscle_kg??null),dir:'up'},
    {n:'內臟脂肪',v:(lat?.visceral??14.5),u:'',prev:(prev?.visceral??null),dir:'down'},
  ];
  h+=`<div class="stats-grid">`;
  stats.forEach(s=>{
    const diff=s.prev!=null?(s.v-s.prev).toFixed(1):null;
    const good=diff!=null?((s.dir==='down'&&+diff<0)||(s.dir==='up'&&+diff>0)):null;
    h+=`<div class="stat">
      <div class="stat-label">${s.n}</div>
      <div class="stat-val">${s.v}<span class="stat-unit">${s.u?' '+s.u:''}</span></div>
      ${diff!=null?`<div class="stat-delta ${good?'delta-good':'delta-bad'}">${+diff>0?'+':''}${diff}${s.u}</div>`:`<div class="stat-delta delta-neu">起點數據</div>`}
    </div>`;
  });
  h+=`</div><div style="height:8px;"></div>`;
  document.getElementById('home-body').innerHTML=h;
}

// ── TIMER ──
let timerInterval=null;
function startTimer(btn,sec){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  let remaining=sec;
  btn.classList.add('running');btn.classList.remove('done');
  timerInterval=setInterval(()=>{
    remaining--;
    if(remaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      btn.textContent='✓ 完成';
      btn.classList.remove('running');btn.classList.add('done');
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }else{
      const m=Math.floor(remaining/60),s=remaining%60;
      btn.textContent=`${m>0?m+'分 ':''}${String(s).padStart(2,'0')}秒`;
    }
  },1000);
  const m=Math.floor(sec/60),s=sec%60;
  btn.textContent=`${m>0?m+'分 ':''}${String(s).padStart(2,'0')}秒`;
}

    h+=`<div class="ex-card${isDone?' done':''}" id="ec${i}">
      <div class="ex-top">
        <div><div class="ex-name">${name}</div><div class="ex-meta">${w.tgt[i]} · 休息${restLabel}</div></div>
        ${isDone?`<span class="done-pill">完成</span>`:''}
      </div>
      ${ld2&&bestKg?`<div class="last-rec">⚡ 上次最高 ${bestKg}kg × ${bestR}下 · RPE ${ld2.rpe||'—'}</div>`:''}
      <div class="sets-header"><span></span><span>公斤</span><span>次數</span><span>組間休息</span></div>`;
    for(let s=0;s<3;s++){
      const sd=ed.sets?.[s]||{};
      h+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <input class="si" type="number" placeholder="—" min="0" step="0.5" value="${sd.kg||''}" onchange="upSet(${i},${s},'kg',this.value)">
        <input class="si" type="number" placeholder="—" min="0" value="${sd.reps||''}" onchange="upSet(${i},${s},'reps',this.value)">
        <button class="timer-btn" onclick="startTimer(this,${restSec})">${restLabel}</button>
      </div>`;
    }
    h+=`<div class="rpe-wrap"><div class="rpe-title">最後一組 RPE</div><div class="rpe-row">`;
    for(let r=6;r<=10;r++)h+=`<button class="rpe-btn${ed.rpe==r?' sel':''}" onclick="setRPE(${i},${r})">${r}</button>`;
    h+=`</div></div></div>`;
  });
  h+=`<button class="done-btn" onclick="finishWO()">完成今日訓練 ✓</button><div style="height:16px;"></div>`;
  document.getElementById('wo-list').innerHTML=h;
}
function upSet(ei,si,f,v){
  if(!wData[ei])wData[ei]={sets:[{},{},{}],rpe:null,done:false};
  if(!wData[ei].sets)wData[ei].sets=[{},{},{}];
  if(!wData[ei].sets[si])wData[ei].sets[si]={};
  wData[ei].sets[si][f]=v;
  if(wData[ei].sets.every(s=>s.kg)){
    wData[ei].done=true;
    const c=document.getElementById('ec'+ei);
    if(c){c.classList.add('done');if(!c.querySelector('.done-pill')){c.querySelector('.ex-top')?.insertAdjacentHTML('beforeend','<span class="done-pill">完成</span>');}}
  }
}
function setRPE(ei,v){
  if(!wData[ei])wData[ei]={sets:[{},{},{}],rpe:null,done:false};
  wData[ei].rpe=v;
  document.querySelectorAll(`#ec${ei} .rpe-btn`).forEach((b,i)=>b.classList.toggle('sel',(i+6)===v));
}
function finishWO(){
  const logs=ld('logs',{});
  logs[tdk()]={type:curWT,ex:JSON.parse(JSON.stringify(wData)),completed:true,ts:new Date().toISOString()};
  sv('logs',logs);
  const w=WO[curWT];
  showCelebrate(`${w.name} 完成！`,'今日訓練紀錄已儲存，繼續保持這個節奏 🔥');
}
function getLastLog(t){
  const logs=ld('logs',{});
  const keys=Object.keys(logs).sort().reverse();
  for(const k of keys){if(k!==tdk()&&logs[k].type===t)return logs[k];}
  return null;
}

// ── TRACK ──
function renderTrack(){
  const bh=ld('body_h',[]);
  const lat=bh.length?{...bh[bh.length-1]}:{};
  let h=`<input type="date" class="date-input" id="mdate" value="${tdk()}">`;
  METRICS.forEach(m=>{
    const cur=lat[m.k]??m.b;
    const pct=calcPct(cur,m.b,m.g,m.dir);
    const bc=m.dir==='down'?'#FF5C5C':'#FF6B1A';
    h+=`<div class="metric-card">
      <div class="m-top">
        <div><div class="m-name">${m.n}</div><div class="m-goal">起點${m.b}${m.u} → 目標${m.g}${m.u}</div></div>
        <div class="m-input-wrap">
          <input class="m-num" type="number" min="${m.min}" max="${m.max}" step="${m.s}" value="${cur}" id="mi_${m.k}" oninput="updBar('${m.k}',${m.b},${m.g},'${m.dir}')">
          <div class="m-unit">${m.u}</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-labels"><span>達成進度</span><span id="bp_${m.k}">${Math.round(pct)}%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="bf_${m.k}" style="width:${pct}%;background:${bc};"></div></div>
      </div>
    </div>`;
  });
  h+=`<button class="save-btn" onclick="saveBody()">儲存本週數據</button>`;
  if(bh.length){
    h+=`<div class="hist-card"><div class="hist-title">歷史紀錄</div>`;
    bh.slice().reverse().forEach(e=>{
      h+=`<div class="hist-row">
        <div><div class="hist-date">${e.date}</div><div style="font-size:11px;color:var(--t3);">體脂${e.fat_pct}% · 骨骼肌${e.muscle_kg}kg</div></div>
        <div style="text-align:right;"><div class="hist-main">${e.weight}kg</div><div class="hist-sub">內臟${e.visceral}</div></div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<div style="height:16px;"></div>`;
  document.getElementById('track-body').innerHTML=h;
}
function calcPct(cur,base,goal,dir){
  if(dir==='down')return Math.min(100,Math.max(0,(base-cur)/(base-goal)*100));
  return Math.min(100,Math.max(0,(cur-base)/(goal-base)*100));
}
function updBar(k,b,g,dir){
  const v=parseFloat(document.getElementById('mi_'+k)?.value)||b;
  const p=calcPct(v,b,g,dir);
  const bf=document.getElementById('bf_'+k),bp=document.getElementById('bp_'+k);
  if(bf)bf.style.width=p+'%';if(bp)bp.textContent=Math.round(p)+'%';
}
function saveBody(){
  const date=document.getElementById('mdate')?.value||tdk();
  const entry={date};
  METRICS.forEach(m=>{const v=parseFloat(document.getElementById('mi_'+m.k)?.value);entry[m.k]=isNaN(v)?m.b:v;});
  const bh=ld('body_h',[]);
  const idx=bh.findIndex(h=>h.date===date);
  if(idx>=0)bh[idx]=entry;else bh.push(entry);
  bh.sort((a,b)=>a.date.localeCompare(b.date));
  sv('body_h',bh);
  alert('數據已儲存 ✅');
  renderTrack();renderHome();
}

// ── PROGRESS ──
const ALL_EX=[
  ...WO.A.ex.map((n,i)=>({n,t:'A',i})),
  ...WO.B.ex.map((n,i)=>({n,t:'B',i})),
  ...WO.C.ex.map((n,i)=>({n,t:'C',i})),
];
function renderProgress(){
  let h=`<select class="ex-select" onchange="drawChart(this.value)">`;
  ALL_EX.forEach((e,gi)=>{h+=`<option value="${gi}">${e.n}（${e.t}）</option>`;});
  h+=`</select><div id="chart-area"></div><div style="height:16px;"></div>`;
  document.getElementById('progress-body').innerHTML=h;
  drawChart(0);
}
function drawChart(gi){
  const ex=ALL_EX[gi];
  const logs=ld('logs',{});
  const pts=[];
  Object.keys(logs).sort().forEach(date=>{
    const log=logs[date];
    if(log.type===ex.t&&log.ex?.[ex.i]){
      const sets=log.ex[ex.i].sets||[];
      const mx=Math.max(...sets.map(s=>parseFloat(s.kg)||0));
      if(mx>0)pts.push({date,kg:mx,rpe:log.ex[ex.i].rpe});
    }
  });
  let h='';
  if(!pts.length){
    h=`<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-text">${ex.n}<br>還沒有紀錄<br>完成第一次訓練後出現</div></div>`;
  }else{
    const best=Math.max(...pts.map(p=>p.kg));
    h=`<div class="pb-card"><div class="pb-title">最佳紀錄</div>
      <div class="pb-best"><span class="pb-val">${best}</span><span class="pb-u">kg</span></div>
      <div class="pb-sub">${pts[pts.length-1].date} · RPE ${pts[pts.length-1].rpe||'—'}</div></div>
    <div class="chart-card"><div class="chart-head">${ex.n} 最高重量趨勢</div><canvas id="pc" height="180"></canvas></div>
    <div class="hist-card"><div class="hist-title">歷史紀錄</div>`;
    pts.slice().reverse().forEach(p=>{
      h+=`<div class="hist-row"><div><div class="hist-date">${p.date}</div></div>
        <div style="text-align:right;"><div class="hist-main">${p.kg}kg</div><div class="hist-sub">RPE ${p.rpe||'—'}</div></div></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('chart-area').innerHTML=h;
  if(pts.length>0)setTimeout(()=>paintChart(pts),60);
}
function paintChart(pts){
  const canvas=document.getElementById('pc');if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth*dpr,H=180*dpr;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const pad={t:20*dpr,r:16*dpr,b:36*dpr,l:44*dpr};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const kgs=pts.map(p=>p.kg);
  const mn=Math.max(0,Math.min(...kgs)-3),mx=Math.max(...kgs)+3;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=3;i++){
    const y=pad.t+(cH/3)*i;
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    ctx.fillStyle='rgba(136,136,168,0.8)';ctx.font=`${10*dpr}px Inter,sans-serif`;ctx.textAlign='right';
    ctx.fillText((mx-(mx-mn)/3*i).toFixed(0),pad.l-6*dpr,y+4*dpr);
  }
  if(pts.length===1){
    const x=pad.l+cW/2,y=pad.t+(1-(pts[0].kg-mn)/(mx-mn))*cH;
    ctx.beginPath();ctx.arc(x,y,6*dpr,0,Math.PI*2);ctx.fillStyle='#FF6B1A';ctx.fill();
  }else{
    const xOf=i=>pad.l+(i/(pts.length-1))*cW;
    const yOf=v=>pad.t+(1-(v-mn)/(mx-mn))*cH;
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(xOf(i),yOf(p.kg)):ctx.lineTo(xOf(i),yOf(p.kg)));
    ctx.lineTo(xOf(pts.length-1),pad.t+cH);ctx.lineTo(pad.l,pad.t+cH);ctx.closePath();
    const fg=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
    fg.addColorStop(0,'rgba(255,107,26,0.2)');fg.addColorStop(1,'rgba(255,107,26,0)');
    ctx.fillStyle=fg;ctx.fill();
    const lg=ctx.createLinearGradient(pad.l,0,pad.l+cW,0);
    lg.addColorStop(0,'#FF6B1A');lg.addColorStop(1,'#FFB547');
    ctx.strokeStyle=lg;ctx.lineWidth=2.5*dpr;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(xOf(i),yOf(p.kg)):ctx.lineTo(xOf(i),yOf(p.kg)));ctx.stroke();
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(xOf(i),yOf(p.kg),4.5*dpr,0,Math.PI*2);
      ctx.fillStyle='#FF6B1A';ctx.fill();
      ctx.strokeStyle='#07080F';ctx.lineWidth=2*dpr;ctx.stroke();
    });
    ctx.fillStyle='rgba(136,136,168,0.8)';ctx.font=`${9*dpr}px Inter,sans-serif`;ctx.textAlign='center';
    const step=Math.max(1,Math.floor(pts.length/5));
    pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1)ctx.fillText(p.date.slice(5),xOf(i),H-6*dpr);});
  }
}

// ── DIET ──
function renderDiet(){
  const d=today();
  document.getElementById('diet-sub').textContent=`${d.getMonth()+1}/${d.getDate()} ${DAYS[d.getDay()]}`;
  const key='diet_'+tdk();
  const data=ld(key,{meals:[false,false,false,false],water:0,protein:false,carb:false,notes:''});
  const meals=[
    {n:'早餐',tags:['豬肉蛋漢堡/吐司','少糖紅茶']},
    {n:'午餐',tags:['蛋白質','碳水','蔬菜']},
    {n:'晚餐',tags:['蛋白質','碳水','蔬菜']},
    {n:'訓練後',tags:['蛋白質補充','碳水半碗-一碗']},
  ];
  const totalL=(data.water*0.35).toFixed(2);
  const atGoal=data.water>=9;
  let h=`<div class="water-card">
    <div class="water-head">
      <div><div class="water-label">今日喝水</div><div class="water-sub">目標 3 公升（9格）</div></div>
      <div class="water-big">${totalL}L</div>
    </div>
    <div class="water-grid">`;
  for(let i=0;i<10;i++){
    const isOn=i<data.water,isTarget=i===8&&data.water>=9;
    h+=`<div class="wc${isOn?' on':''}${isTarget?' target':''}" onclick="togW(${i})">💧</div>`;
  }
  h+=`</div>${atGoal?'<div class="water-goal-badge">🔥 達標！今日喝水目標完成</div>':''}
  <div class="water-hint">每格 350ml · 點擊記錄 · 第9格達標</div></div>`;
  meals.forEach((m,i)=>{
    h+=`<div class="meal-card">
      <div class="meal-top"><div class="meal-name">${m.n}</div>
        <div class="meal-check${data.meals[i]?' on':''}" onclick="togM(${i})">${data.meals[i]?'✓':''}</div>
      </div>
      <div class="meal-tags">${m.tags.map(t=>`<span class="meal-tag">${t}</span>`).join('')}</div>
    </div>`;
  });
  h+=`<div class="check-card">
    <label class="check-row">
      <div class="check-box${data.protein?' on':''}"><svg width="12" height="10" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"${data.protein?'':' style="display:none"'}><polyline points="1 5 4.5 8.5 11 1"/></svg></div>
      <span class="check-text">每餐都有蛋白質</span>
      <input type="checkbox" style="display:none" ${data.protein?'checked':''} onchange="saveDC('protein',this.checked)">
    </label>
    <label class="check-row">
      <div class="check-box${data.carb?' on':''}"><svg width="12" height="10" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"${data.carb?'':' style="display:none"'}><polyline points="1 5 4.5 8.5 11 1"/></svg></div>
      <span class="check-text">澱粉沒有過量</span>
      <input type="checkbox" style="display:none" ${data.carb?'checked':''} onchange="saveDC('carb',this.checked)">
    </label>
  </div>
  <div class="meal-card">
    <div class="meal-name" style="margin-bottom:10px;">備註</div>
    <textarea class="meal-note" placeholder="聚餐、喝酒、特殊情況..." onchange="saveDN(this.value)">${data.notes||''}</textarea>
  </div><div style="height:16px;"></div>`;
  document.getElementById('diet-body').innerHTML=h;
  document.querySelectorAll('.check-row').forEach(row=>{
    row.addEventListener('click',()=>{const cb=row.querySelector('input[type=checkbox]');if(cb){cb.checked=!cb.checked;cb.dispatchEvent(new Event('change'));}});
  });
}
function togW(i){
  const key='diet_'+tdk();
  const data=ld(key,{meals:[false,false,false,false],water:0,protein:false,carb:false,notes:''});
  data.water=data.water===i+1?i:i+1;sv(key,data);renderDiet();
}
function togM(i){
  const key='diet_'+tdk();
  const data=ld(key,{meals:[false,false,false,false],water:0,protein:false,carb:false,notes:''});
  data.meals[i]=!data.meals[i];sv(key,data);renderDiet();
}
function saveDC(f,v){
  const key='diet_'+tdk();
  const data=ld(key,{meals:[false,false,false,false],water:0,protein:false,carb:false,notes:''});
  data[f]=v;sv(key,data);
}
function saveDN(v){
  const key='diet_'+tdk();
  const data=ld(key,{meals:[false,false,false,false],water:0,protein:false,carb:false,notes:''});
  data.notes=v;sv(key,data);
}

// ── INIT ──
setIPChar('home');
renderHome();
</script>
